# Ajouté le 2026-07-20 : sans ce fichier, Railway/Nixpacks détecte ce repo
# comme un projet Python standard et n'installe PAS ffmpeg/ffprobe. Le
# nouvel endpoint /api/uploads/video-chat (extraction audio + frames d'une
# vidéo, voir api/uploads.py) en dépend directement via subprocess -- sans
# ce paquet système, il échoue en prod avec FileNotFoundError au premier
# appel, alors que tout fonctionne normalement en local si ffmpeg est déjà
# installé sur la machine du développeur (d'où le risque de ne jamais le
# remarquer avant un déploiement réel).
#
# Complété le 2026-07-20 (même jour) : WeasyPrint (génération de PDF, voir
# core/generation_documents.py) a besoin en plus de Pango/cairo/GDK-Pixbuf
# etc. Sans elles, le déploiement plante avec "cannot load library
# 'libgobject-2.0-0'". Un seul fichier nixpacks.toml est lu par Railway,
# donc TOUTE nouvelle dépendance système future doit être ajoutée ICI,
# dans cette même liste, jamais dans un fichier séparé.
[phases.setup]
nixPkgs = [
  "ffmpeg",
  "...",
  "pango",
  "cairo",
  "gdk-pixbuf",
  "libffi",
  "fontconfig",
  "harfbuzz",
  "shared-mime-info",
]
